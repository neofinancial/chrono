name: CI

on:
  pull_request:
    types: ["opened", "reopened", "synchronize"]

# Enforce least privilege - no default permissions at workflow level
permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    strategy:
      matrix:
        # 22.22.2+ toolcache ships a broken global npm (missing promise-retry); pin until fixed upstream.
        node-version: [20.x, 22.22.1, 24.x]

    steps:
      - name: Perform source code checkout
        uses: actions/checkout@v6

      - name: Setup Node version
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache Package Node Modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            node_modules
            packages/*/node_modules
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-

      - name: Install
        run: |
          npm install -g npm@11.2.0
          npm install -g pnpm@10.30.0
          pnpm install

      - name: Build
        run: pnpm run build
        if: github.ref != 'refs/heads/master'

      - name: Type check
        run: pnpm run typecheck

      - name: Check
        run: pnpm run check
      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test
        if: github.ref != 'refs/heads/master'
